<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès refusé – Rémi Bertrand</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --main: #d35400;
            --dark: #2c3e50;
        }

        body {
            background: #f4f4f4 url('carrote.jpg') repeat;
            background-size: 150px;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        .container {
            max-width: 900px;
            margin: 120px auto;
            background: white;
            padding: 60px;
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: var(--main);
            font-size: 2rem;
            margin-bottom: 30px;
            font-family: 'Georgia', serif;
        }

        .text-zone {
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* TEXTE QUI S'ÉCRIT */
        #typed {
            font-size: 1.3rem;
            color: var(--dark);
            white-space: pre-wrap;
            border-right: 3px solid var(--main);
            padding-right: 6px;
            animation: blink 0.7s infinite;
            font-family: 'Georgia', serif;
            display: inline-block;
        }

        @keyframes blink {
            0% { border-color: transparent; }
            50% { border-color: var(--main); }
            100% { border-color: transparent; }
        }

        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 14px 28px;
            background: var(--main);
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.25s;
        }

        .back-btn:hover {
            background: #b84300;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Erreur 403</h1>

    
    <div class="text-zone">
        <div id="typed"></div>
    </div>

    <a href="https://remibertrand.net/accueil" class="back-btn">Retour au site</a>

</div>

<footer>© 2026 Rémi Bertrand</footer>

<script>
const text = "Vous n'êtes pas autorisé à accéder à cette ressource.";

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typed").textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, 25);
    }
}

setTimeout(typeWriter, 300);
</script>

<script src="secure.js"></script>

</body>
</html>
